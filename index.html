<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Langum</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1e2a4a;
    --navy-mid: #3d4f72;
    --navy-muted: #8892aa;
    --pink: #e8638c;
    --pink-light: #fde8ef;
    --pink-dark: #c94d75;
    --bg: #f8f9fc;
    --bg-card: #ffffff;
    --rule: #e2e6f0;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Nunito', system-ui, sans-serif;
    --sidebar-w: 156px;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body { background: var(--bg); color: var(--navy); font-family: var(--sans); min-height: 100vh; }
  .app-wrapper { display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--navy);
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    display: flex; flex-direction: column; padding-top: 1.5rem;
  }
  .sidebar-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--navy-muted); padding: 0 1rem 0.75rem;
    border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.5rem;
  }
  .lang-btn {
    display: flex; align-items: center; gap: 9px;
    width: 100%; padding: 10px 1rem;
    background: transparent; border: none; border-left: 3px solid transparent;
    cursor: pointer; font-family: var(--sans); text-align: left;
    transition: all 0.15s; color: rgba(255,255,255,0.55);
  }
  .lang-btn:hover { background: rgba(255,255,255,0.07); color: white; }
  .lang-btn.active { background: rgba(232,99,140,0.15); color: white; font-weight: 700; border-left-color: var(--pink); }
  .lang-flag { font-size: 19px; line-height: 1; flex-shrink: 0; }
  .lang-name { font-size: 12px; line-height: 1.2; }

  /* ── Main ── */
  .main-content { flex: 1; min-width: 0; }

  /* ── Masthead ── */
  .masthead {
    background: white;
    border-bottom: 1px solid var(--rule);
    padding: 1.25rem 2rem 1rem;
    text-align: center;
  }
  .masthead-logo {
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
  }
  .masthead-logo img { height: 110px; width: auto; }
  .masthead-sub { font-size: 12px; color: var(--navy-muted); font-weight: 600; letter-spacing: 0.05em; margin-top: 2px; }

  /* ── Mode tabs ── */
  .mode-tabs {
    display: flex; background: white;
    border-bottom: 1px solid var(--rule);
    overflow-x: auto; padding: 0 1rem;
  }
  .mode-tab {
    flex: 1; min-width: max-content;
    padding: 12px 14px;
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    background: transparent; border: none;
    border-bottom: 3px solid transparent; margin-bottom: -1px;
    cursor: pointer; color: var(--navy-muted);
    transition: color 0.15s; white-space: nowrap;
  }
  .mode-tab.active { color: var(--pink); border-bottom-color: var(--pink); }
  .mode-tab:hover:not(.active) { color: var(--navy); }

  /* ── Controls ── */
  .controls { max-width: 700px; margin: 2rem auto; padding: 0 1.5rem; }
  .control-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--navy-muted); margin-bottom: 10px; display: block;
  }
  .pick-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .pick-btn {
    padding: 7px 15px;
    background: white; color: var(--navy-mid);
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    border: 1.5px solid var(--rule);
    border-radius: 50px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .pick-btn:hover { border-color: var(--pink); color: var(--pink); }
  .pick-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
  .pick-btn.random-btn { border-color: var(--pink); color: var(--pink); }
  .pick-btn.random-btn:hover { background: var(--pink-light); }
  #levelRow .pick-btn { flex: 1; min-width: 44px; text-align: center; }
  .gen-row { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .gen-btn {
    padding: 13px 40px;
    background: var(--pink); color: white;
    font-family: var(--sans); font-size: 15px; font-weight: 700;
    border: none; border-radius: 50px;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(232,99,140,0.35);
  }
  .gen-btn:hover { background: var(--pink-dark); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(232,99,140,0.4); }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn:disabled { background: var(--navy-muted); cursor: not-allowed; box-shadow: none; transform: none; }
  .controls-hint { font-size: 13px; color: var(--navy-muted); text-align: center; font-weight: 600; }

  /* ── Custom text area ── */
  .custom-textarea {
    width: 100%; min-height: 180px; padding: 14px;
    font-family: var(--sans); font-size: 14px; line-height: 1.6;
    color: var(--navy); background: white;
    border: 1.5px solid var(--rule); border-radius: var(--radius-sm);
    resize: vertical; outline: none; margin-bottom: 8px;
  }
  .custom-textarea:focus { border-color: var(--pink); }
  .char-count { font-size: 11px; color: var(--navy-muted); text-align: right; margin-bottom: 1.5rem; font-weight: 600; }
  .char-count.over { color: var(--pink); }

  /* ── Loading / Error / Debug ── */
  .loading { display: none; text-align: center; padding: 3rem; color: var(--navy-muted); font-size: 13px; font-weight: 600; }
  .loading-dots::after { content: ''; animation: dots 1.2s steps(4,end) infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} 100%{content:''} }
  .error-box { display: none; max-width: 780px; margin: 0 auto 1rem; padding: 12px 16px; background: var(--pink-light); border-left: 3px solid var(--pink); color: var(--pink-dark); font-size: 13px; border-radius: var(--radius-sm); white-space: pre-wrap; font-weight: 600; }
  .debug-box { display: none; max-width: 780px; margin: 0 auto 2rem; padding: 12px 16px; background: white; border: 1px solid var(--rule); color: var(--navy-mid); font-size: 12px; border-radius: var(--radius-sm); white-space: pre-wrap; overflow-x: auto; }

  /* ── Article ── */
  .article-outer { display: none; max-width: 780px; margin: 0 auto 4rem; padding: 0 1.5rem; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .tag-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--navy); color: white;
    padding: 4px 10px; border-radius: 50px;
  }
  .tag-domain { background: var(--pink-light); color: var(--pink-dark); }
  .tag-source { background: var(--rule); color: var(--navy-muted); font-style: italic; text-transform: none; letter-spacing: 0; }

  .rule-thick { border: none; border-top: 2px solid var(--rule); margin: 1.5rem 0; }
  .section-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--pink); margin-bottom: 12px; }

  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 12px; margin-bottom: 2rem; }
  .vocab-card { background: white; padding: 14px 16px; border-radius: var(--radius); border: 1px solid var(--rule); box-shadow: 0 1px 4px rgba(30,42,74,0.06); }
  .vocab-word { font-family: var(--serif); font-size: 16px; font-weight: 600; color: var(--navy); margin-bottom: 5px; }
  .vocab-def { font-size: 13px; color: var(--navy-mid); line-height: 1.5; margin-bottom: 6px; }
  .vocab-ex { font-size: 12px; color: var(--navy-muted); font-style: italic; line-height: 1.5; border-top: 1px solid var(--rule); padding-top: 6px; margin-top: 6px; }

  .source-bar {
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    background: white; border: 1px solid var(--rule);
    border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 1.25rem;
    font-size: 12px; color: var(--navy-mid); font-weight: 600;
  }
  .source-bar a { color: var(--pink); text-decoration: none; font-size: 11px; font-weight: 700; }
  .source-bar a:hover { text-decoration: underline; }
  .source-notice {
    font-size: 12px; color: var(--navy-muted); font-style: italic;
    padding: 8px 14px; border-left: 3px solid var(--pink-light);
    margin-bottom: 1rem; font-weight: 600; background: var(--pink-light);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }

  .article-headline { font-family: var(--serif); font-size: clamp(20px,3.5vw,34px); font-weight: 600; line-height: 1.25; color: var(--navy); margin-bottom: 1rem; }
  .article-byline { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--navy-muted); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
  .article-byline::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .article-body p { font-size: 16px; line-height: 1.85; color: var(--navy); margin-bottom: 1.2rem; font-weight: 400; }
  .article-body p:first-child::first-letter { font-family: var(--serif); font-size: 52px; font-weight: 600; float: left; line-height: 0.85; margin: 4px 8px 0 0; color: var(--pink); }

  .questions-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 2rem; }
  .questions-block { background: white; border: 1px solid var(--rule); border-radius: var(--radius); padding: 1.5rem; box-shadow: 0 1px 4px rgba(30,42,74,0.06); }
  .questions-block h3 { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--pink); margin-bottom: 12px; }
  .q-item { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--rule); align-items: flex-start; }
  .q-item:last-child { border-bottom: none; padding-bottom: 0; }
  .q-num { font-family: var(--sans); font-size: 13px; font-weight: 800; color: var(--pink); min-width: 20px; line-height: 1.6; }
  .q-text { font-size: 14px; line-height: 1.65; color: var(--navy-mid); padding-top: 1px; font-weight: 600; }

  .next-row { text-align: center; padding-bottom: 2.5rem; }
  .next-btn {
    padding: 11px 32px; background: transparent; color: var(--navy);
    font-family: var(--sans); font-size: 13px; font-weight: 700;
    border: 2px solid var(--navy); border-radius: 50px; cursor: pointer;
    transition: all 0.15s;
  }
  .next-btn:hover { background: var(--navy); color: white; }

  @media (max-width: 640px) {
    .app-wrapper { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; border-right: none; flex-direction: row; padding: 0; overflow-x: auto; overflow-y: hidden; }
    .sidebar-label { display: none; }
    .lang-btn { flex-direction: column; align-items: center; gap: 3px; padding: 10px 12px; border-left: none; border-bottom: 3px solid transparent; flex-shrink: 0; }
    .lang-btn.active { border-left-color: transparent; border-bottom-color: var(--pink); }
    .questions-row { grid-template-columns: 1fr; }
    .masthead-logo img { height: 38px; }
    .masthead-wordmark { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="app-wrapper">
  <nav class="sidebar" id="sidebar"><span class="sidebar-label">Language</span></nav>
  <div class="main-content">
    <header class="masthead">
      <div class="masthead-logo">
        <img src="langum_logo.png" alt="Langum" />
      </div>
      <p class="masthead-sub" id="uiSub"></p>
    </header>

    <div class="mode-tabs">
      <button class="mode-tab active" id="tabNews"      onclick="switchMode('news')">📰 <span id="uiTabNews"></span></button>
      <button class="mode-tab"        id="tabReads"     onclick="switchMode('reads')">💡 <span id="uiTabReads"></span></button>
      <button class="mode-tab"        id="tabWiki"      onclick="switchMode('wiki')">🌐 <span id="uiTabWiki"></span></button>
      <button class="mode-tab"        id="tabLit"       onclick="switchMode('lit')">📖 <span id="uiTabLit"></span></button>
      <button class="mode-tab"        id="tabCustom"    onclick="switchMode('custom')">✏️ <span id="uiTabCustom"></span></button>
    </div>

    <div class="controls">
      <!-- Level row: news + reads only -->
      <div id="levelSection">
        <span class="control-label" id="uiLevelLabel"></span>
        <div class="pick-row" id="levelRow">
          <button class="pick-btn" data-level="A1">A1</button>
          <button class="pick-btn" data-level="A2">A2</button>
          <button class="pick-btn" data-level="B1">B1</button>
          <button class="pick-btn active" data-level="B2">B2</button>
          <button class="pick-btn" data-level="C1">C1</button>
          <button class="pick-btn" data-level="C2">C2</button>
        </div>
      </div>

      <!-- Category/genre row -->
      <div id="categorySection">
        <span class="control-label" id="uiTopicLabel"></span>
        <div class="pick-row" id="categoryRow"></div>
      </div>

      <!-- Custom text area -->
      <div id="customSection" style="display:none">
        <span class="control-label" id="uiCustomLabel"></span>
        <textarea class="custom-textarea" id="customText" maxlength="6000"></textarea>
        <div class="char-count" id="charCount">0 / 6000</div>
      </div>

      <div class="gen-row">
        <button class="gen-btn" id="genBtn" onclick="handleGenerate()">↻</button>
        <p class="controls-hint" id="uiHint"></p>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>
    <div class="debug-box" id="debugBox"></div>
    <div class="loading" id="loadingBox"><span class="loading-dots" id="uiLoading"></span></div>

    <div class="article-outer" id="articleOuter">
      <div class="tag-row" id="tagRow"></div>
      <div id="sourceBar" class="source-bar" style="display:none">
        <span id="sourceTitle"></span>
        <a id="sourceLink" href="#" target="_blank" rel="noopener"></a>
      </div>
      <div id="sourceNotice" class="source-notice" style="display:none"></div>
      <div class="section-eyebrow" id="uiVocabHeader"></div>
      <div class="vocab-grid" id="vocabGrid"></div>
      <hr class="rule-thick"/>
      <h2 class="article-headline" id="articleTitle"></h2>
      <div class="article-byline" id="uiByline"></div>
      <div class="article-body" id="articleBody"></div>
      <hr class="rule-thick"/>
      <div class="questions-row">
        <div class="questions-block"><h3 id="uiComprehensionHeader"></h3><div id="comprehensionList"></div></div>
        <div class="questions-block"><h3 id="uiDiscussionHeader"></h3><div id="discussionList"></div></div>
      </div>
      <div class="next-row"><button class="next-btn" id="uiNextBtn" onclick="handleGenerate()"></button></div>
    </div>
  </div>
</div>

// ── Prompts (always English, never shown to user) ────────────────

const LEVEL_INSTRUCTIONS = {
  A1:`- Very simple sentences (subject+verb+object only).\n- Only most common 1000 words.\n- Max 8 words per sentence.\n- No subjunctive, no passive voice.`,
  A2:`- Simple sentences with occasional subordinate clauses.\n- Basic vocabulary, no jargon.\n- Max 12 words per sentence.`,
  B1:`- Clear sentences with subordinate clauses.\n- Everyday vocabulary with some terms explained in context.\n- Occasional passive voice.`,
  B2:`- Journalistic style.\n- Varied vocabulary, technical terms used in context.\n- Normal use of passive and subordinate clauses.`,
  C1:`- Elevated journalistic style.\n- Complex structures, rich vocabulary, reported speech.\n- Nominalisations and abstract concepts.`,
  C2:`- Sophisticated literary-journalistic style.\n- Complex hypotaxis, rhetorical devices, near-native vocabulary.`
};

  Wirtschaft:"An economic development at a well-known company or market",

  Gesellschaft:"A current social trend or societal change",
  Kultur:"A cultural event or trend in art, literature, or media",
  Umwelt:"An environmental or climate news story with a specific location or measurement",
  Gesundheit:"A new health study or medical recommendation",
  Sport:"A sports story: record, tournament result, or athlete profile",
  Schule:"A change or debate in the education system",
  Lifestyle:"A trend in food, travel, fashion, or everyday culture",

function buildNewsPrompt(category, level, lang) {
  return `You are an editor for a language learning platform.
Create a fictional but realistic-sounding daily news article at ${level} level (CEFR).
Topic: ${NEWS_SEEDS[category]}
Output language: Write the ENTIRE response in ${lang.targetLanguage} only.
Level rules for ${level}: ${LEVEL_INSTRUCTIONS[level]}
Rules: neutral journalistic tone; no opinions; sounds current (use "recently", "this week", etc.); mention at least one specific place/number/organisation; exactly 4 paragraphs of 3-4 sentences; 6 vocabulary entries; 4 comprehension questions; 4 discussion questions.
Reply with ONLY valid JSON:
{"domain":"...","title":"...","vocab":[{"word":"...","definition":"...","example":"..."}],"paragraphs":["...","...","...","..."],"comprehension":["...","...","...","..."],"discussion":["...","...","...","..."]}`;
}

function buildReadsPrompt(category, level, lang) {
  return `You are an editor for a language learning platform focused on enriching non-fiction reads.
Create an engaging, well-researched article at ${level} level (CEFR) on the following theme.
Topic: ${READS_SEEDS[category]}
Output language: Write the ENTIRE response in ${lang.targetLanguage} only.
Level rules for ${level}: ${LEVEL_INSTRUCTIONS[level]}
Rules: thoughtful, essay-like tone; factual and informative; no bullet points; include at least one concrete detail (name, date, place, study); exactly 4 paragraphs of 4-5 sentences; 6 vocabulary entries; 4 comprehension questions; 4 open discussion questions.
Reply with ONLY valid JSON:
{"domain":"...","title":"...","vocab":[{"word":"...","definition":"...","example":"..."}],"paragraphs":["...","...","...","..."],"comprehension":["...","...","...","..."],"discussion":["...","...","...","..."]}`;
}

// ── Mode switch ──────────────────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  ["news","reads","wiki","lit","custom"].forEach(m => {
    document.getElementById("tab"+m.charAt(0).toUpperCase()+m.slice(1)).classList.toggle("active", m === mode);
  });
  const lang = LANGUAGES[currentLang];
  const showLevel = mode === "news" || mode === "reads";
  document.getElementById("levelSection").style.display = showLevel ? "block" : "none";
  document.getElementById("categorySection").style.display = mode === "custom" ? "none" : "block";
  document.getElementById("customSection").style.display = mode === "custom" ? "block" : "none";

  const topicLabelMap = { news: lang.topicLabelNews, reads: lang.topicLabelReads, wiki: lang.topicLabelWiki, lit: lang.topicLabelLit };
  if (mode !== "custom") document.getElementById("uiTopicLabel").textContent = topicLabelMap[mode] || "";

  const hintMap = { news: lang.hint, reads: lang.hintReads, wiki: lang.hintWiki, lit: lang.hintLit, custom: lang.hintCustom };
  document.getElementById("uiHint").textContent = hintMap[mode] || "";

  const btnMap = { news: lang.generateBtn, reads: lang.generateBtn, wiki: lang.fetchWikiBtn, lit: lang.fetchLitBtn, custom: lang.analyzeBtn };
  document.getElementById("genBtn").textContent = "↻  " + (btnMap[mode] || lang.generateBtn);

  if (mode === "news") buildPickButtons(lang.newsCategories, lang);
  else if (mode === "reads") buildPickButtons(lang.readsCategories, lang);
  else if (mode === "wiki") buildPickButtons(lang.wikiCategories, lang);
  else if (mode === "lit") buildPickButtons(lang.litGenres, lang, false);

  document.getElementById("articleOuter").style.display = "none";
  hideError(); hideDebug();
}

// ── Apply language ───────────────────────────────────────────────
function applyLanguage(code) {
  currentLang = code;
  const lang = LANGUAGES[code];
  document.documentElement.lang = lang.htmlLang;
  document.title = lang.pageTitle;
  document.getElementById("uiSub").textContent = lang.sub;
  document.getElementById("uiTabNews").textContent = lang.tabNews;
  document.getElementById("uiTabReads").textContent = lang.tabReads;
  document.getElementById("uiTabWiki").textContent = lang.tabWiki;
  document.getElementById("uiTabLit").textContent = lang.tabLit;
  document.getElementById("uiTabCustom").textContent = lang.tabCustom;
  document.getElementById("uiLevelLabel").textContent = lang.levelLabel;
  document.getElementById("uiCustomLabel").textContent = lang.customLabel;
  document.getElementById("uiVocabHeader").textContent = lang.vocabHeader;
  document.getElementById("uiComprehensionHeader").textContent = lang.comprehensionHeader;
  document.getElementById("uiDiscussionHeader").textContent = lang.discussionHeader;
  document.getElementById("uiLoading").textContent = lang.loading;
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === code));
  switchMode(currentMode);
}

// ── Build sidebar ────────────────────────────────────────────────
function buildSidebar() {
  const sidebar = document.getElementById("sidebar");
  Object.entries(LANGUAGES).forEach(([code, lang]) => {
    const btn = document.createElement("button");
    btn.className = "lang-btn"; btn.dataset.lang = code;
    btn.innerHTML = `<span class="lang-flag">${lang.flag}</span><span class="lang-name">${lang.name}</span>`;
    btn.addEventListener("click", () => applyLanguage(code));
    sidebar.appendChild(btn);
  });
}

// ── Build pick buttons ───────────────────────────────────────────
function buildPickButtons(cats, lang, withRandom=true) {
  const row = document.getElementById("categoryRow");
  row.innerHTML = ""; selectedCategory = null;
  Object.entries(cats).forEach(([key, label]) => {
    const btn = document.createElement("button");
    btn.className = "pick-btn"; btn.dataset.cat = key; btn.textContent = label;
    row.appendChild(btn);
  });
  if (withRandom) {
    const rnd = document.createElement("button");
    rnd.className = "pick-btn random-btn"; rnd.textContent = lang.randomBtn;
    rnd.addEventListener("click", () => {
      const keys = Object.keys(cats);
      selectCat(row, keys[Math.floor(Math.random()*keys.length)]);
    });
    row.appendChild(rnd);
  }
  row.addEventListener("click", e => {
    const btn = e.target.closest(".pick-btn");
    if (!btn || btn.classList.contains("random-btn")) return;
    selectCat(row, btn.dataset.cat);
  });
}

function selectCat(row, key) {
  row.querySelectorAll(".pick-btn").forEach(b => b.classList.remove("active"));
  const t = row.querySelector(`[data-cat="${CSS.escape(key)}"]`);
  if (t) t.classList.add("active");
  selectedCategory = key;
}

// ── Level row ────────────────────────────────────────────────────
document.getElementById("levelRow").addEventListener("click", e => {
  const btn = e.target.closest(".pick-btn");
  if (!btn) return;
  document.querySelectorAll("#levelRow .pick-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active"); selectedLevel = btn.dataset.level;
});

// ── Char counter ─────────────────────────────────────────────────
document.getElementById("customText").addEventListener("input", function() {
  const len = this.value.length;
  const el = document.getElementById("charCount");
  el.textContent = len + " / " + MAX_CHARS;
  el.classList.toggle("over", len > MAX_CHARS);
});

// ── Route generate ───────────────────────────────────────────────
function handleGenerate() {
  if (currentMode === "news")    generateArticle("news");
  else if (currentMode === "reads") generateArticle("reads");
  else if (currentMode === "wiki")  generateWikipedia();
  else if (currentMode === "lit")   generateLiterature();
  else if (currentMode === "custom") generateCustom();
}

// ── Generate AI article (news + reads) ──────────────────────────
async function generateArticle(mode) {
  const lang = LANGUAGES[currentLang];
  if (!selectedCategory) { showError(lang.noCategory); return; }
  setLoading(true, lang.loading, lang.generatingBtn);
  hideError(); hideDebug();
  document.getElementById("articleOuter").style.display = "none";
  try {
    const prompt = mode === "news" ? buildNewsPrompt(selectedCategory, selectedLevel, lang) : buildReadsPrompt(selectedCategory, selectedLevel, lang);
    const res = await fetch(PROXY_URL, { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{role:"user",parts:[{text:prompt}]}], generationConfig:{temperature:0.8,maxOutputTokens:4096} }) });
    const raw = await parseProxy(res);
    const d = JSON.parse(raw);
    d.domain = d.domain || selectedCategory;
    d.title = d.title || "—";
    ["vocab","paragraphs","comprehension","discussion"].forEach(k => { if (!Array.isArray(d[k])) d[k]=[]; });
    const byline = mode === "news" ? lang.byline : lang.bylineReads;
    renderArticle(d, lang, selectedLevel, lang.newsCategories[d.domain] || lang.readsCategories[d.domain] || d.domain, byline, lang.nextBtn);
  } catch(e) { showError("Error: "+e.message); }
  finally { setLoading(false, lang.loading, mode==="news"?lang.generateBtn:lang.generateBtn); }
}

// ── Generate Wikipedia ───────────────────────────────────────────
async function generateWikipedia() {
  const lang = LANGUAGES[currentLang];
  if (!selectedCategory) { showError(lang.noCategory); return; }
  setLoading(true, lang.loadingWiki, "⏳ …");
  hideError(); hideDebug();
  document.getElementById("articleOuter").style.display = "none";
  try {
    // Search Wikipedia for a random article in the selected category
    const searchUrl = `https://${lang.wikisub}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(selectedCategory)}&srnamespace=0&srlimit=20&format=json&origin=*`;
    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();
    const results = searchData?.query?.search || [];
    if (!results.length) throw new Error("No Wikipedia articles found for this theme.");

    // Pick a random result and fetch its extract
    const pick = results[Math.floor(Math.random()*results.length)];
    const title = pick.title;
    const extractUrl = `https://${lang.wikisub}.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts&explaintext=true&exsectionformat=plain&format=json&origin=*`;
    const extractRes = await fetch(extractUrl);
    const extractData = await extractRes.json();
    const pages = extractData?.query?.pages || {};
    const pageData = Object.values(pages)[0];
    const fullText = pageData?.extract || "";
    if (!fullText || fullText.length < 200) throw new Error("Article too short. Try again.");

    const excerpt = trimToWords(fullText, 300);
    const wikiUrl = `https://${lang.wikisub}.wikipedia.org/wiki/${encodeURIComponent(title)}`;

    // AI generates vocab + questions
    const prompt = buildExternalTextPrompt(excerpt, lang);
    const res = await fetch(PROXY_URL, { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{role:"user",parts:[{text:prompt}]}], generationConfig:{temperature:0.7,maxOutputTokens:8192} }) });
    const raw = await parseProxy(res);
    const d = JSON.parse(raw);

    renderExternalText(d, lang, title, excerpt, wikiUrl, lang.sourceNoticeWiki, lang.sourceLink, "Wikipedia", lang.bylineWiki);
  } catch(e) { showError("Error: "+e.message); }
  finally { setLoading(false, lang.loadingWiki, lang.fetchWikiBtn); }
}

// ── Generate Literature (Gutendex) ───────────────────────────────
async function generateLiterature() {
  const lang = LANGUAGES[currentLang];
  if (!selectedCategory) { showError(lang.noCategory); return; }
  setLoading(true, lang.loadingLit, "⏳ …");
  hideError(); hideDebug();
  document.getElementById("articleOuter").style.display = "none";
  try {
    const gutUrl = `https://gutendex.com/books/?languages=${lang.wikisub}&topic=${encodeURIComponent(selectedCategory)}&sort=popular`;
    const gutRes = await fetch(gutUrl);
    const gutData = await gutRes.json();
    const allBooks = gutData?.results || [];
    if (!allBooks.length) throw new Error("No books found for this genre and language. Try another genre.");

    // Shuffle and try up to 8 books, skipping audiobooks and books without usable plain text
    const shuffled = [...allBooks].sort(() => Math.random() - 0.5);
    let excerpt = null, title = null, gutBookUrl = null;

    for (let i = 0; i < Math.min(8, shuffled.length); i++) {
      const book = shuffled[i];
      const formats = book.formats || {};

      try {
        // Use Gutenberg's reliable cache URL pattern instead of Gutendex-provided URLs
        const reliableTxtUrl = `https://www.gutenberg.org/cache/epub/${book.id}/pg${book.id}.txt`;
        const proxyTxtUrl = PROXY_URL + "/gutenberg?url=" + encodeURIComponent(reliableTxtUrl);
        const txtRes = await fetch(proxyTxtUrl);
        const txtData = await txtRes.json();
        const rawText = txtData?.text || "";
        if (!rawText || rawText.length < 500) continue;

        // Detect audiobook playlists or HTML error pages — skip
        if (rawText.includes("Read by:") || rawText.includes("#EXTM3U") || rawText.includes("00:0") || rawText.includes("<html") || rawText.includes("Error 404")) continue;

        // Skip Gutenberg boilerplate: find the first real paragraph after line 60
        const lines = rawText.split("\n");
        const start = Math.max(60, Math.floor(lines.length * 0.1));
        const chunk = lines.slice(start, start + 150).join("\n");
        const candidate = trimToWords(chunk, 250);
        if (candidate.trim().split(/\s+/).length < 80) continue;

        excerpt = candidate;
        title = book.title + (book.authors?.length ? " — " + book.authors[0].name : "");
        gutBookUrl = `https://www.gutenberg.org/ebooks/${book.id}`;
        break;
      } catch(e) { continue; }
    }

    if (!excerpt) throw new Error("Could not find a suitable text. Try another genre or press again.");

    const prompt = buildExternalTextPrompt(excerpt, lang);
    const res = await fetch(PROXY_URL, { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{role:"user",parts:[{text:prompt}]}], generationConfig:{temperature:0.7,maxOutputTokens:8192} }) });
    const raw = await parseProxy(res);
    const d = JSON.parse(raw);

    renderExternalText(d, lang, title, excerpt, gutBookUrl, lang.sourceNoticeLit, lang.sourceLinkLit, "Gutenberg", lang.bylineLit);
  } catch(e) { showError("Error: "+e.message); }
  finally { setLoading(false, lang.loadingLit, lang.fetchLitBtn); }
}

// ── Generate Custom Text ─────────────────────────────────────────
async function generateCustom() {
  const lang = LANGUAGES[currentLang];
  const text = document.getElementById("customText").value.trim();
  if (!text) { showError(lang.noText); return; }
  if (text.length > MAX_CHARS) { showError("Text is too long. Please trim it to " + MAX_CHARS + " characters."); return; }
  setLoading(true, lang.loading, "⏳ …");
  hideError(); hideDebug();
  document.getElementById("articleOuter").style.display = "none";
  try {
    const prompt = buildExternalTextPrompt(text, lang);
    const res = await fetch(PROXY_URL, { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{role:"user",parts:[{text:prompt}]}], generationConfig:{temperature:0.7,maxOutputTokens:8192} }) });
    const raw = await parseProxy(res);
    const d = JSON.parse(raw);
    renderExternalText(d, lang, lang.tabCustom, text, null, null, null, "Custom", lang.bylineCustom);
  } catch(e) { showError("Error: "+e.message); }
  finally { setLoading(false, lang.loading, lang.analyzeBtn); }
}

// ── Parse proxy response ─────────────────────────────────────────
async function parseProxy(res) {
  const responseText = await res.text();
  let data;
  try { data = JSON.parse(responseText); }
  catch(e) { showDebug("Raw HTTP response:\n"+responseText.slice(0,800)); throw new Error("API response was not valid JSON."); }
  if (!res.ok) { showDebug(JSON.stringify(data,null,2)); throw new Error(data.error?.message || "HTTP "+res.status); }
  const raw = (data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||"").join("\n").trim();
  if (!raw) { showDebug(JSON.stringify(data,null,2)); throw new Error("No text returned. Finish reason: "+(data.candidates?.[0]?.finishReason||"unknown")); }
  // Strip markdown fences
  let cleaned = raw.replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/\s*```$/,"").trim();
  // Extract the JSON object/array even if there is surrounding text
  const objStart = cleaned.indexOf("{");
  const objEnd   = cleaned.lastIndexOf("}");
  if (objStart !== -1 && objEnd !== -1 && objEnd > objStart) {
    cleaned = cleaned.slice(objStart, objEnd+1);
  }
  return cleaned;
}

// ── Renderers ────────────────────────────────────────────────────
function renderArticle(d, lang, levelTag, domainLabel, byline, nextLabel) {
  document.getElementById("tagRow").innerHTML =
    `<span class="tag">${escapeHtml(levelTag)}</span><span class="tag tag-domain">${escapeHtml(domainLabel)}</span>`;
  document.getElementById("sourceBar").style.display = "none";
  document.getElementById("sourceNotice").style.display = "none";
  document.getElementById("uiVocabHeader").textContent = lang.vocabHeader;
  document.getElementById("articleTitle").textContent = d.title;
  document.getElementById("uiByline").textContent = byline;
  document.getElementById("uiComprehensionHeader").textContent = lang.comprehensionHeader;
  document.getElementById("uiDiscussionHeader").textContent = lang.discussionHeader;
  document.getElementById("uiNextBtn").textContent = nextLabel;
  renderVocab(d.vocab||[]);
  document.getElementById("articleBody").innerHTML = (d.paragraphs||[]).slice(0,4).map(p=>`<p>${escapeHtml(p)}</p>`).join("");
  renderQuestions(d.comprehension||[], d.discussion||[]);
  showArticle();
}

function renderExternalText(d, lang, title, text, url, notice, linkLabel, tagLabel, byline) {
  document.getElementById("tagRow").innerHTML = `<span class="tag">${escapeHtml(tagLabel)}</span><span class="tag tag-source">${escapeHtml(title)}</span>`;
  const bar = document.getElementById("sourceBar");
  if (url) {
    bar.style.display = "flex";
    document.getElementById("sourceTitle").textContent = title;
    const lnk = document.getElementById("sourceLink");
    lnk.href = url; lnk.textContent = linkLabel || "View source ↗";
  } else { bar.style.display = "none"; }
  const noticeEl = document.getElementById("sourceNotice");
  if (notice) { noticeEl.style.display = "block"; noticeEl.textContent = notice; }
  else { noticeEl.style.display = "none"; }
  document.getElementById("uiVocabHeader").textContent = lang.vocabHeader;
  document.getElementById("articleTitle").textContent = title;
  document.getElementById("uiByline").textContent = byline;
  document.getElementById("uiComprehensionHeader").textContent = lang.comprehensionHeader;
  document.getElementById("uiDiscussionHeader").textContent = lang.discussionHeader;
  document.getElementById("uiNextBtn").textContent = lang.nextBtnFetch;
  renderVocab(d.vocab||[]);
  const paras = text.split("\n\n").filter(p=>p.trim().length>0).map(p=>`<p>${escapeHtml(p.trim())}</p>`).join("");
  document.getElementById("articleBody").innerHTML = paras || `<p>${escapeHtml(text)}</p>`;
  renderQuestions(d.comprehension||[], d.discussion||[]);
  showArticle();
}

function renderVocab(vocab) {
  document.getElementById("vocabGrid").innerHTML = vocab.slice(0,6).map(v=>
    `<div class="vocab-card"><div class="vocab-word">${escapeHtml(v.word||"")}</div><div class="vocab-def">${escapeHtml(v.definition||"")}</div><div class="vocab-ex">${escapeHtml(v.example||"")}</div></div>`
  ).join("");
}

function renderQuestions(comp, disc) {
  document.getElementById("comprehensionList").innerHTML = comp.slice(0,4).map((q,i)=>
    `<div class="q-item"><span class="q-num">${i+1}</span><span class="q-text">${escapeHtml(q)}</span></div>`).join("");
  document.getElementById("discussionList").innerHTML = disc.slice(0,4).map((q,i)=>
    `<div class="q-item"><span class="q-num">${i+1}</span><span class="q-text">${escapeHtml(q)}</span></div>`).join("");
}

function showArticle() {
  document.getElementById("articleOuter").style.display = "block";
  document.getElementById("articleOuter").scrollIntoView({behavior:"smooth",block:"start"});
}

// ── Helpers ──────────────────────────────────────────────────────
function trimToWords(text, max) {
  const clean = text.replace(/\n{3,}/g,"\n\n").trim();
  const paras = clean.split("\n\n").map(p=>p.trim()).filter(p=>p.length>15);
  return paras.join("\n\n").split(/\s+/).slice(0,max).join(" ");
}

function escapeHtml(v) {
  return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function setLoading(on, loadingText, btnLabel) {
  document.getElementById("loadingBox").style.display = on ? "block" : "none";
  document.getElementById("uiLoading").textContent = loadingText || "";
  document.getElementById("genBtn").disabled = on;
  if (!on) {
    const lang = LANGUAGES[currentLang];
    const btnMap = { news:lang.generateBtn, reads:lang.generateBtn, wiki:lang.fetchWikiBtn, lit:lang.fetchLitBtn, custom:lang.analyzeBtn };
    document.getElementById("genBtn").textContent = "↻  " + (btnMap[currentMode]||lang.generateBtn);
  }
}
function showError(m) { const e=document.getElementById("errorBox"); e.textContent=m; e.style.display="block"; }
function hideError() { document.getElementById("errorBox").style.display="none"; }
function showDebug(m) { const e=document.getElementById("debugBox"); e.textContent=m; e.style.display="block"; }
function hideDebug() { document.getElementById("debugBox").style.display="none"; }

// ── Init ─────────────────────────────────────────────────────────
buildSidebar();
applyLanguage("de");
// Pre-select a random news category
const newsKeys = Object.keys(LANGUAGES.de.newsCategories);
selectCat(document.getElementById("categoryRow"), newsKeys[Math.floor(Math.random()*newsKeys.length)]);
</script>
