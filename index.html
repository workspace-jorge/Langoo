<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deutsches Tagesgeschehen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a18;
    --ink-mid: #4a4a45;
    --ink-muted: #8a8a82;
    --paper: #f5f2eb;
    --rule: #d4cfc4;
    --accent: #c8392b;
    --accent-light: #f5e6e4;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --sidebar-w: 148px;
  }

  body { background: var(--paper); color: var(--ink); font-family: var(--sans); min-height: 100vh; }

  /* ── Layout ── */
  .app-wrapper { display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-right: 3px double var(--ink);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding-top: 1.25rem;
  }

  .sidebar-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: 0 1rem 0.75rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0.5rem;
  }

  .lang-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    width: 100%;
    padding: 10px 1rem;
    background: transparent;
    border: none;
    border-left: 3px solid transparent;
    cursor: pointer;
    font-family: var(--sans);
    text-align: left;
    transition: all 0.15s;
    color: var(--ink-mid);
  }
  .lang-btn:hover  { background: white; color: var(--ink); }
  .lang-btn.active { background: white; color: var(--ink); font-weight: 500; border-left-color: var(--accent); }

  .lang-flag { font-size: 19px; line-height: 1; flex-shrink: 0; }
  .lang-name { font-size: 12px; line-height: 1.2; }

  /* ── Main ── */
  .main-content { flex: 1; min-width: 0; }

  /* ── Masthead ── */
  .masthead { border-bottom: 3px double var(--ink); padding: 1.5rem 2rem 1rem; text-align: center; }
  .masthead-kicker { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 6px; }
  .masthead-title  { font-family: var(--serif); font-size: clamp(24px,4vw,44px); font-weight: 600; line-height: 1; }
  .masthead-title span { color: var(--accent); }
  .masthead-sub    { font-size: 11px; color: var(--ink-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 8px; }

  /* ── Mode tabs ── */
  .mode-tabs {
    display: flex;
    border-bottom: 2px solid var(--ink);
  }
  .mode-tab {
    flex: 1;
    padding: 10px 16px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    color: var(--ink-muted);
    transition: color 0.12s;
  }
  .mode-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .mode-tab:hover:not(.active) { color: var(--ink); }

  /* ── Controls ── */
  .controls { max-width: 680px; margin: 2rem auto; padding: 0 1.5rem; }

  .control-label { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; display: block; }

  .pick-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }

  .pick-btn {
    padding: 8px 14px;
    background: white; color: var(--ink-mid);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--rule); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .pick-btn:hover  { border-color: var(--ink-mid); color: var(--ink); }
  .pick-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .pick-btn.random-btn { border-color: var(--accent); color: var(--accent); }
  .pick-btn.random-btn:hover { background: var(--accent-light); }
  .pick-btn.random-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  #levelRow .pick-btn { flex: 1; min-width: 44px; text-align: center; }

  .gen-row { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .gen-btn { padding: 13px 36px; background: var(--accent); color: white; font-family: var(--sans); font-size: 14px; font-weight: 500; letter-spacing: 0.04em; border: none; cursor: pointer; transition: background 0.15s; display: inline-flex; align-items: center; gap: 10px; }
  .gen-btn:hover    { background: #a82e22; }
  .gen-btn:disabled { background: var(--ink-muted); cursor: not-allowed; }
  .controls-hint { font-size: 12px; color: var(--ink-muted); letter-spacing: 0.04em; text-align: center; }

  /* ── Loading / Error / Debug ── */
  .loading { display: none; text-align: center; padding: 3rem; color: var(--ink-muted); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; }
  .loading-dots::after { content: ''; animation: dots 1.2s steps(4,end) infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} 100%{content:''} }

  .error-box { display: none; max-width: 780px; margin: 0 auto 1rem; padding: 12px 16px; background: var(--accent-light); border-left: 3px solid var(--accent); color: var(--accent); font-size: 13px; white-space: pre-wrap; }
  .debug-box { display: none; max-width: 780px; margin: 0 auto 2rem; padding: 12px 16px; background: #fff; border: 1px solid var(--rule); color: var(--ink-mid); font-size: 12px; white-space: pre-wrap; overflow-x: auto; }

  /* ── Article ── */
  .article-outer { display: none; max-width: 780px; margin: 0 auto 4rem; padding: 0 1.5rem; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .tag-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tag { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; background: var(--ink); color: var(--paper); padding: 3px 8px; }
  .tag-domain { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .tag-source { background: transparent; color: var(--ink-muted); border: 1px solid var(--rule); font-style: italic; text-transform: none; letter-spacing: 0; }

  .rule-thick { border: none; border-top: 2px solid var(--ink); margin: 1.5rem 0; }
  .section-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }

  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-bottom: 2rem; }
  .vocab-card { background: white; padding: 14px 16px; }
  .vocab-word { font-family: var(--serif); font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
  .vocab-def  { font-size: 13px; color: var(--ink-mid); line-height: 1.5; margin-bottom: 6px; }
  .vocab-ex   { font-size: 12px; color: var(--ink-muted); font-style: italic; line-height: 1.5; border-top: 1px solid var(--rule); padding-top: 6px; margin-top: 6px; }

  .classic-notice {
    font-size: 12px; color: var(--ink-muted); font-style: italic;
    padding: 8px 12px; border-left: 2px solid var(--rule); margin-bottom: 1rem;
  }
  .classic-source-bar {
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    background: #ede9df; border: 1px solid var(--rule); padding: 9px 14px; margin-bottom: 1.25rem;
    font-size: 12px; color: var(--ink-mid);
  }
  .classic-source-bar a { color: var(--accent); text-decoration: none; font-size: 11px; letter-spacing: 0.05em; }
  .classic-source-bar a:hover { text-decoration: underline; }

  .article-headline { font-family: var(--serif); font-size: clamp(20px,3.5vw,34px); font-weight: 600; line-height: 1.25; margin-bottom: 1rem; }
  .article-byline { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; }
  .article-byline::after { content: ''; flex: 1; height: 1px; background: var(--rule); }

  .article-body p { font-size: 16px; line-height: 1.8; color: var(--ink); margin-bottom: 1.2rem; font-weight: 300; }
  .article-body p:first-child::first-letter { font-family: var(--serif); font-size: 52px; font-weight: 600; float: left; line-height: 0.85; margin: 4px 8px 0 0; color: var(--accent); }

  .questions-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
  .questions-block { background: white; border: 1.5px solid var(--ink); padding: 1.5rem; }
  .questions-block h3 { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }

  .q-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--rule); align-items: flex-start; }
  .q-item:last-child { border-bottom: none; padding-bottom: 0; }
  .q-num  { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--accent); min-width: 22px; line-height: 1.4; }
  .q-text { font-size: 14px; line-height: 1.65; color: var(--ink-mid); padding-top: 2px; }

  .next-row { text-align: center; padding-bottom: 2rem; }
  .next-btn { padding: 10px 28px; background: transparent; color: var(--ink); font-family: var(--sans); font-size: 13px; font-weight: 500; border: 1.5px solid var(--ink); cursor: pointer; letter-spacing: 0.04em; }
  .next-btn:hover { background: #ede9df; }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    .app-wrapper { flex-direction: column; }
    .sidebar {
      width: 100%; height: auto; position: static;
      border-right: none; border-bottom: 3px double var(--ink);
      flex-direction: row; padding: 0;
      overflow-x: auto; overflow-y: hidden;
    }
    .sidebar-label { display: none; }
    .lang-btn {
      flex-direction: column; align-items: center; gap: 3px;
      padding: 10px 12px; border-left: none;
      border-bottom: 3px solid transparent; flex-shrink: 0;
    }
    .lang-btn.active { border-left-color: transparent; border-bottom-color: var(--accent); }
    .questions-row { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="app-wrapper">

    <div class="controls">

      <div id="levelSection">
        <span class="control-label" id="uiLevelLabel"></span>
        <div class="pick-row" id="levelRow">
          <button class="pick-btn" data-level="A1">A1</button>

          <button class="pick-btn" data-level="B1">B1</button>
          <button class="pick-btn active" data-level="B2">B2</button>
          <button class="pick-btn" data-level="C1">C1</button>
          <button class="pick-btn" data-level="C2">C2</button>
        </div>
      </div>

      <!-- Category/genre row: changes per mode -->
      <span class="control-label" id="uiTopicLabel"></span>
      <div class="pick-row" id="categoryRow">
        <!-- injected by JS -->
      </div>

      <div class="gen-row">
        <button class="gen-btn" id="genBtn" onclick="handleGenerate()">↻</button>
        <p class="controls-hint" id="uiHint"></p>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>
    <div class="debug-box"  id="debugBox"></div>
    <div class="loading"    id="loadingBox"><span class="loading-dots" id="uiLoading"></span></div>

    <div class="article-outer" id="articleOuter">
      <div class="tag-row" id="tagRow">

        <span id="classicSourceTitle"></span>

      <div id="classicNotice" class="classic-notice" style="display:none"></div>

      <div class="section-eyebrow" id="uiVocabHeader"></div>
      <div class="vocab-grid" id="vocabGrid"></div>

      <hr class="rule-thick" />

      <h2 class="article-headline" id="articleTitle"></h2>
      <div class="article-byline"  id="uiByline"></div>
      <div class="article-body"    id="articleBody"></div>

      <hr class="rule-thick" />

      <div class="questions-row">
        <div class="questions-block">
          <h3 id="uiComprehensionHeader"></h3>
          <div id="comprehensionList"></div>
        </div>
        <div class="questions-block">
          <h3 id="uiDiscussionHeader"></h3>
          <div id="discussionList"></div>
        </div>
      </div>

      <div class="next-row">
        <button class="next-btn" id="uiNextBtn" onclick="handleGenerate()"></button>
      </div>
    </div>

  </div><!-- /main-content -->
</div><!-- /app-wrapper -->

  // ── News prompt builder (your exact original logic) ──────────
  function buildNewsPrompt(category, level, lang) {
    return `You are an editor for a language learning platform.

Create an original, fictional but realistic-sounding daily news article at ${level} level (CEFR).

Topic: ${CATEGORY_SEEDS[category]}

Output language: Write the ENTIRE response — title, article body, all vocabulary entries, and all questions — in ${lang.targetLanguage}. Do not use any other language anywhere.

Language level rules for ${level}:
${LEVEL_INSTRUCTIONS[level]}

General rules:
- Neutral, factual, journalistic tone.
- No opinions, no speculation, no source citations.
- The article should sound current. Use words meaning "recently", "this week", "yesterday" or "today" in ${lang.targetLanguage}.
- Mention at least one specific place, number or organisation.
- Write exactly 4 paragraphs with 3 to 4 sentences each.
- Create exactly 6 vocabulary entries appropriate for ${level} level.
- Create exactly 4 comprehension questions appropriate for ${level} level.
- Create exactly 4 open discussion questions appropriate for ${level} level.
`;
  }

  // ── Classic prompt builder (English, never shown) ─────────────
  function buildClassicPrompt(excerpt, lang) {
    return `You are a language learning content editor. A student is reading the following authentic text in ${lang.targetLanguage}.

ORIGINAL TEXT:
"""
${excerpt}
"""

Your task: generate learning scaffolding IN ${lang.targetLanguage} around this text.

Rules:
- vocab: exactly 6 words or phrases taken from the text that a learner might find challenging. Definitions must be in ${lang.targetLanguage} (not English). Example sentences must be NEW sentences not from the text above.
- comprehension: exactly 4 questions whose answers are found directly in the text. Write in ${lang.targetLanguage}.
- discussion: exactly 4 open personal/opinion questions inspired by the text's themes. Write in ${lang.targetLanguage}.
- Everything in ${lang.targetLanguage} only.
`;
  }

  // ── Mode switch ───────────────────────────────────────────────
  function switchMode(mode) {
    currentMode = mode;
    document.getElementById("tabNews").classList.toggle("active", mode === "news");
    document.getElementById("tabClassic").classList.toggle("active", mode === "classic");

    const lang = LANGUAGES[currentLang];

    // Level row: only in news mode
    document.getElementById("levelSection").style.display = mode === "news" ? "block" : "none";

    // Topic label + buttons change
    if (mode === "news") {
      document.getElementById("uiTopicLabel").textContent = lang.topicLabel;
      document.getElementById("uiHint").textContent       = lang.hint;
      buildCategoryButtons(lang, selectedCategory);
    } else {
      document.getElementById("uiTopicLabel").textContent = lang.genreLabel;
      document.getElementById("uiHint").textContent       = lang.classicHint;
      buildGenreButtons(lang);
    }

    // Reset article
    document.getElementById("articleOuter").style.display = "none";
    hideError(); hideDebug();
  }

  function applyLanguage(langCode) {
    currentLang = langCode;

    document.documentElement.lang = lang.htmlLang;
    document.title = lang.pageTitle;

    document.getElementById("uiTitle").innerHTML    = lang.titleHTML;

    document.getElementById("uiComprehensionHeader").textContent = lang.comprehensionHeader;
    document.getElementById("uiDiscussionHeader").textContent   = lang.discussionHeader;

    document.querySelectorAll(".lang-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.lang === langCode);
    });

    switchMode(currentMode);

  // ── Build news category buttons (your original logic) ─────────
  function buildCategoryButtons(lang, preserveSelection) {
    const row = document.getElementById("categoryRow");
    row.innerHTML = "";
    selectedCategory = null;

    Object.keys(CATEGORY_SEEDS).forEach(key => {
      const btn = document.createElement("button");
      btn.className        = "pick-btn";
      btn.dataset.category = key;
      btn.textContent      = lang.categories[key] || key;
      if (key === preserveSelection) { btn.classList.add("active"); selectedCategory = key; }
      row.appendChild(btn);
    });

    const rnd = document.createElement("button");
    rnd.className   = "pick-btn random-btn";
    rnd.textContent = lang.randomBtn;
    rnd.addEventListener("click", pickRandomCategory);
    row.appendChild(rnd);

    row.addEventListener("click", e => {
      const btn = e.target.closest(".pick-btn");
      if (!btn || btn.classList.contains("random-btn")) return;
      row.querySelectorAll(".pick-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedCategory = btn.dataset.category;
    });
  }

  // ── Generate news (your exact original logic) ─────────────────
  async function generateNews() {
    const lang = LANGUAGES[currentLang];
    if (!selectedCategory) { showError(lang.noCategory); return; }

    setLoading(true, lang.loading, lang.generatingBtn);
    hideError(); hideDebug();
    document.getElementById("articleOuter").style.display = "none";

    try {
      const requestBody = {
        contents: [{ role:"user", parts:[{ text: buildNewsPrompt(selectedCategory, selectedLevel, lang) }] }],
        generationConfig: {
          temperature: 0.7, maxOutputTokens: 4096,
          responseMimeType: "application/json",
          responseSchema: NEWS_SCHEMA
        }
      };

      const res = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(requestBody)
      });

      const responseText = await res.text();
      let data;
      try { data = JSON.parse(responseText); }
      catch(e) { showDebug("Raw HTTP response:\n\n" + responseText); throw new Error("API response was not valid JSON."); }

      if (!res.ok) { showDebug(JSON.stringify(data,null,2)); throw new Error(data.error?.message || "HTTP " + res.status); }

      const raw = (data.candidates?.[0]?.content?.parts || []).map(p => p.text||"").join("\n").trim();
      if (!raw) { showDebug(JSON.stringify(data,null,2)); throw new Error("No text returned. Finish reason: " + (data.candidates?.[0]?.finishReason||"unknown")); }

      let parsed;
      try { parsed = JSON.parse(raw); }
      catch(e) { showDebug("Raw model output:\n\n" + raw); throw new Error("Model returned text but not valid JSON."); }

      normalizeNewsData(parsed);
      renderNews(parsed, lang);
    } catch(e) {
      console.error(e);
      showError("Error: " + e.message);
    } finally {
      setLoading(false, lang.loading, lang.generateBtn);
    }
  }

      });

      const responseText = await res.text();
      let data;
      try { data = JSON.parse(responseText); }
      catch(e) { showDebug("Raw HTTP response:\n\n" + responseText); throw new Error("API response was not valid JSON."); }

      if (!res.ok) { showDebug(JSON.stringify(data,null,2)); throw new Error(data.error?.message || "HTTP " + res.status); }

      const raw = (data.candidates?.[0]?.content?.parts || []).map(p => p.text||"").join("\n").trim();
      if (!raw) throw new Error("No text returned from AI.");

      let parsed;
      try { parsed = JSON.parse(raw); }

  // ── Wikisource fetch ──────────────────────────────────────────
  async function fetchWikisourcePage(subdomain, categoryName) {
    const prefixMap = { de:"Kategorie", fr:"Cat\u00e9gorie", es:"Categor\u00eda", it:"Categoria", pt:"Categoria", en:"Category", nl:"Categorie" };
    const prefix = prefixMap[subdomain] || "Category";

    // Step 1: get category members via worker
    const catUrl = PROXY_URL + "/wikisource-cat?sub=" + encodeURIComponent(subdomain)
                 + "&cat=" + encodeURIComponent(categoryName)
                 + "&prefix=" + encodeURIComponent(prefix);
    const catRes  = await fetch(catUrl);
    const catData = await catRes.json();
    const members = catData?.query?.categorymembers || [];

    if (!members.length) {
      showDebug("Category response:\n" + JSON.stringify(catData, null, 2));
      throw new Error("No pages found in \"" + prefix + ":" + categoryName + "\" on " + subdomain + ".wikisource.org");
    }

    // Step 2: shuffle, try up to 8 pages — fetch parsed HTML via worker
    const shuffled  = [...members].sort(() => Math.random() - 0.5);
    const debugLines = ["Found " + members.length + " pages in \"" + categoryName + "\". Trying up to 8..."];

    for (let i = 0; i < Math.min(8, shuffled.length); i++) {
      const title = shuffled[i].title;
      const url   = "https://" + subdomain + ".wikisource.org/wiki/" + encodeURIComponent(title);
      debugLines.push("\n[" + (i+1) + "] \"" + title + "\"");

      try {
        const wsUrl  = PROXY_URL + "/wikisource?sub=" + encodeURIComponent(subdomain) + "&title=" + encodeURIComponent(title);
        const wsRes  = await fetch(wsUrl);
        const wsData = await wsRes.json();

        if (!wsData.html) {
          debugLines.push("  -> no HTML returned, skipping");
          continue;
        }

        debugLines.push("  -> " + wsData.html.length + " chars of HTML");
        const cleaned   = cleanHTML(wsData.html);
        const wordCount = cleaned.split(/\s+/).filter(w => w.length > 0).length;
        debugLines.push("  -> " + wordCount + " words after cleaning");

        if (wordCount >= 80) {
          showDebug(debugLines.join("\n"));
          return { title, text: cleaned, url };
        }
        debugLines.push("  -> too short, skipping");
      } catch(e) {
        debugLines.push("  -> error: " + e.message);
        continue;
      }
    }

    showDebug(debugLines.join("\n"));
    throw new Error("Could not find a page with enough text in \"" + categoryName + "\". Try again or pick a different genre.");
  }

  function cleanHTML(html) {
    // Remove entire unwanted block elements before stripping tags
    const cleaned = html
      // Remove navigation boxes, info tables, edit links, references sections
      .replace(/<table[\s\S]*?<\/table>/gi, "")
      .replace(/<div[^>]*class="[^"]*(?:navigation|noprint|mw-editsection|reflist|reference|toc|thumb|ws-header|ws-footer|footer)[^"]*"[^>]*>[\s\S]*?<\/div>/gi, "")
      .replace(/<span[^>]*class="[^"]*mw-editsection[^"]*"[^>]*>[\s\S]*?<\/span>/gi, "")
      .replace(/<sup[^>]*>[\s\S]*?<\/sup>/gi, "")
      // Convert block elements to newlines so paragraphs are preserved
      .replace(/<\/p>/gi, "\n\n")
      .replace(/<\/div>/gi, "\n")
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<\/h[1-6]>/gi, "\n\n")
      // Strip all remaining tags
      .replace(/<[^>]+>/g, "")
      // Decode common HTML entities
      .replace(/&amp;/g, "&")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/&quot;/g, '"')
      .replace(/&#039;/g, "'")
      .replace(/&nbsp;/g, " ")
      // Collapse whitespace
      .replace(/\n{3,}/g, "\n\n")
      .replace(/[ \t]{2,}/g, " ")
      .trim();
    return cleaned;
  }

  function trimToWords(text, maxWords) {
    const paras = text.split("\n\n").map(p => p.trim()).filter(p => p.length > 20);
    return paras.join("\n\n").split(/\s+/).slice(0, maxWords).join(" ");
  }

  // ── Normalise (news) ──────────────────────────────────────────
  function normalizeNewsData(d) {
    if (!d || typeof d !== "object") throw new Error("Response is not a valid object.");
    if (!d.domain)                   d.domain        = selectedCategory;
    if (!d.title)                    d.title         = "—";
    if (!Array.isArray(d.vocab))         d.vocab         = [];
    if (!Array.isArray(d.paragraphs))    d.paragraphs    = [];
    if (!Array.isArray(d.comprehension)) d.comprehension = [];
    if (!Array.isArray(d.discussion))    d.discussion    = [];
  }

  // ── Render news ───────────────────────────────────────────────
  function renderNews(d, lang) {
    // Tags
    document.getElementById("tagRow").innerHTML =
      `<span class="tag">${escapeHtml(selectedLevel)}</span>
       <span class="tag tag-domain">${escapeHtml(lang.categories[d.domain] || d.domain)}</span>`;

    // Hide classic extras
    document.getElementById("classicSourceBar").style.display = "none";
    document.getElementById("classicNotice").style.display    = "none";

    document.getElementById("uiVocabHeader").textContent        = lang.vocabHeader;
    document.getElementById("articleTitle").textContent         = d.title;
    document.getElementById("uiByline").textContent             = lang.byline;
    document.getElementById("uiComprehensionHeader").textContent = lang.comprehensionHeader;
    document.getElementById("uiDiscussionHeader").textContent   = lang.discussionHeader;
    document.getElementById("uiNextBtn").textContent            = lang.nextBtn;

    renderVocab(d.vocab);
    document.getElementById("articleBody").innerHTML =
      d.paragraphs.slice(0,4).map(p => `<p>${escapeHtml(p)}</p>`).join("");
    renderQuestions(d.comprehension, d.discussion);

    document.getElementById("articleOuter").style.display = "block";
    document.getElementById("articleOuter").scrollIntoView({ behavior:"smooth", block:"start" });
  }

  // ── Render classic ────────────────────────────────────────────
  function renderClassic(d, lang, title, excerpt, url) {
    // Tags
    document.getElementById("tagRow").innerHTML =
      `<span class="tag">Wikisource</span>
       <span class="tag tag-source">${escapeHtml(title)}</span>`;

    // Source bar
    const bar = document.getElementById("classicSourceBar");
    bar.style.display = "flex";
    document.getElementById("classicSourceTitle").textContent = title;
    document.getElementById("classicSourceLink").href = url;

    // Notice
    const notice = document.getElementById("classicNotice");
    notice.style.display = "block";
    notice.textContent   = lang.classicNotice;

    document.getElementById("uiVocabHeader").textContent        = lang.vocabHeader;
    document.getElementById("articleTitle").textContent         = title;
    document.getElementById("uiByline").textContent             = lang.classicByline;
    document.getElementById("uiComprehensionHeader").textContent = lang.comprehensionHeader;
    document.getElementById("uiDiscussionHeader").textContent   = lang.discussionHeader;
    document.getElementById("uiNextBtn").textContent            = lang.nextClassicBtn;

    renderVocab(d.vocab || []);
    // Render the real Wikisource text
    document.getElementById("articleBody").innerHTML =
      excerpt.split("\n\n").filter(p => p.trim()).map(p => `<p>${escapeHtml(p.trim())}</p>`).join("");
    renderQuestions(d.comprehension || [], d.discussion || []);

    document.getElementById("articleOuter").style.display = "block";
    document.getElementById("articleOuter").scrollIntoView({ behavior:"smooth", block:"start" });
  }

  // ── Shared renderers ──────────────────────────────────────────
  function renderVocab(vocab) {
    document.getElementById("vocabGrid").innerHTML = vocab.slice(0,6).map(v => `
      <div class="vocab-card">
        <div class="vocab-word">${escapeHtml(v.word||"")}</div>
        <div class="vocab-def">${escapeHtml(v.definition||"")}</div>
        <div class="vocab-ex">${escapeHtml(v.example||"")}</div>
      </div>`).join("");
  }

  function renderQuestions(comprehension, discussion) {
    document.getElementById("comprehensionList").innerHTML =
      comprehension.slice(0,4).map((q,i) => `
        <div class="q-item"><span class="q-num">${i+1}</span><span class="q-text">${escapeHtml(q)}</span></div>`).join("");
    document.getElementById("discussionList").innerHTML =
      discussion.slice(0,4).map((q,i) => `
        <div class="q-item"><span class="q-num">${i+1}</span><span class="q-text">${escapeHtml(q)}</span></div>`).join("");
  }

  function escapeHtml(v) {
    return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  // ── Loading / error helpers ───────────────────────────────────
  function setLoading(on, loadingText, btnText) {
    const lang = LANGUAGES[currentLang];
    document.getElementById("loadingBox").style.display = on ? "block" : "none";
    document.getElementById("uiLoading").textContent    = loadingText || lang.loading;
    document.getElementById("genBtn").disabled    = on;
    document.getElementById("genBtn").textContent = on ? (btnText || "⏳ …") : "↻ \u00A0" + (currentMode === "news" ? lang.generateBtn : lang.fetchBtn);
  }

  function showError(msg) { const b = document.getElementById("errorBox"); b.textContent = msg; b.style.display = "block"; }
  function hideError()    { document.getElementById("errorBox").style.display = "none"; }
  function showDebug(msg) { const b = document.getElementById("debugBox"); b.textContent = msg; b.style.display = "block"; }
  function hideDebug()    { document.getElementById("debugBox").style.display = "none"; }

  // ── Init ──────────────────────────────────────────────────────
  buildSidebar();
  applyLanguage("de");
  pickRandomCategory();
</script>
</body>
</html>
